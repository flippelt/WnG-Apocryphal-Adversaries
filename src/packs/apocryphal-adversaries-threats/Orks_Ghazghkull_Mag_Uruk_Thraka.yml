  notes: >-
    <p>Ghazghkull Mag Uruk Thraka is an Ork Warlord of the Goff clan and a mighty
    prophet of the WAAAGH! &mdash; the single most influential Ork in the galaxy
    in the late 41st Millennium, with billions of Greenskins marching to war in
    his name. He has crushed Aeldari war hosts, banished tides of daemons and
    reduced the Hive World of Armageddon to a never-ending cauldron of battle, yet
    is not satisfied: at the behest of Gork and Mork he is gathering the Great
    WAAAGH! that will drown the galaxy in green fire.</p><p><em>Prophet of Gork and
    Mork caps his Wounds per Round at 7 and grants immunity to Shock (this profile
    has no Shock track).</em></p>
