    system:
      effect: ""
      cost: 0
      requirements: ""
      description: "<p><strong>Power Through Pain.</strong> <em>Harvesting Pain:</em> each time a DRUKHARI Threat or Mob kills an enemy, or causes one to become Wounded, Exhausted, Pinned, or to suffer the Fear or Terror condition, gain 1 Pain Token — a general pool usable by any DRUKHARI Threat or Mob in the scene (never gained from unliving enemies).</p><p><em>Spending Pain Tokens:</em> <strong>Tormentor’s Fury</strong> (charge: +Tier Speed and +Tier dice); <strong>Tormentor’s Majesty</strong> (Intimidation attack: +Tier dice and inflict Fear); <strong>Tormentor’s Might</strong> (melee: +Tier Strength); <strong>Tormentor’s Supremacy</strong> (Determination: +Tier dice, wounds negated ignored not converted to Shock); <strong>Tormentor’s Vigour</strong> (start of turn: recover 1d3+Tier Wounds and all Shock); <strong>Tormentor’s Will</strong> (Resolve/Conviction Test: auto-succeed). See page 7.</p>"
      display: true
    effects: []
    folder: null
    sort: 0
    ownership:
