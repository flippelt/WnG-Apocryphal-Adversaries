  notes: >-
    <p>As Mekboyz grow in size and experience, many become Big Meks &mdash;
    commanding squads of lesser Meks and countless Gretchin and devising the more
    potent Ork wargear, such as Mega Armour and Kustom-Blastas. The most powerful,
    sometimes called "Mek Bosses," lead whole warbands and tribes; their forces
    run tech-heavy, with a higher-than-normal concentration of kustom gear and
    Kombi-weapons. This one strides to war encased in a piston-driven suit of Mega
    Armour.</p><p><em>Threat Options &mdash; Kontrapshunz: carries exactly ONE of
    a Kustom Force Field, a Tellyport Blasta or a Tellyporta (all included
    unequipped). Kustom Gubbinz: may swap the Power Klaw for a Killsaw, and the
    Kustom Mega-Blasta for a Kustom Shoota.</em></p>
