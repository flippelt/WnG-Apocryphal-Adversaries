  notes: >-
    <p>A Squig ("Squiggly Beast") is the simplest known form of Orkoid life,
    filling countless roles in the Ork ecosystem &mdash; food, hair, medical,
    face-eater and more. An Attack Squig is one of the most common types: a
    bouncing ball of claws and razor-sharp teeth with immense variation between
    individuals. Gretchin use them as a food source (if the Squig doesn't eat
    them first) or as a weapon of war, driving herds into the
    enemy.</p><p><em>Variants &mdash; A <strong>Bomb Squig</strong> has explosives
    strapped on; instead of biting, one that gets within 1m of an enemy Detonates
    (the Bomb Squig Explosion profile, included unequipped below) and then dies. A
    <strong>Squighound</strong> ("Growler") is used by Runtherdz to keep Gretchin
    and slaves in line, and grants the Squig Hound bonus.</em></p>
