  notes: >-
    <p>Burna Boyz are those pyromaniacal Greenskins whose desire to burn and
    destroy grows to consume them entirely. They depend on Mekboyz to keep them
    supplied with Promethium fuel and the heavy blowtorch/flamethrowers known as
    Burnas that give them their name. These dedicated arsonists take great
    delight in setting fire to the enemy &mdash; and anybody and anything else
    they can lay their hands on if no enemy is available. Their mass incendiary
    firepower can prove devastating, particularly against enemy infantry,
    flushing foes out of defended positions; with the weapon turned to a searing
    blowtorch point they also serve to cut up armour, vehicles and battlefield
    salvage.</p><p><em>Spannerz &mdash; Groups of Burna Boyz are often
    accompanied by one or more Spannerz, who use the same profile with the
    following changes: a Spanner gains the <strong>MEK</strong> keyword; its
    skills are Default 6, Awareness 5 (Passive 2), Intimidation 6, Tech 7,
    Ballistic Skill 5, Weapon Skill 7; and instead of the Burna it is armed with
    Stikkbombs and one of the Big Shoota, Rokkit Launcha or Kustom Mega-Blasta
    (all three are included unequipped below).</em></p>
