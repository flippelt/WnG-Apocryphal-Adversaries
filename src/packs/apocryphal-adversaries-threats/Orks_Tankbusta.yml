  notes: >-
    <p>A Tankbusta is an Ork Boy completely addicted to the thrill of destroying
    the armoured fighting vehicles of his foes; the desire to hunt down and slay
    the biggest, most dangerous tanks echoes the primal instinct of the big-game
    hunter. They equip themselves extensively for dealing death to enemy armour
    &mdash; whistling volleys of Rokkits and lethal Tankbusta Bomb assaults that
    can spell annihilation for even the heaviest tank. After a kill, a Tankbusta
    enjoys being "tanked up": devouring the wrecked crew and drinking engine oil
    from the smoking remains.</p><p><em>Threat Options &mdash; Special Weapons:
    one in five Tankbustas may replace their Rokkit Launcha with Two Rokkit
    Pistols or a Tankhammer (both included unequipped below).</em></p>
