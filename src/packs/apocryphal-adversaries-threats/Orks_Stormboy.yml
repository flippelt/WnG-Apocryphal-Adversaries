  notes: >-
    <p>Stormboyz are elite Ork shock troops who show an unusual level of strategic
    planning and tactical acumen for Greenskins, and are particularly skilled at
    mobile warfare. The Stormboy Korps strikes deals with local Meks to equip them
    with large, noisy Rokkit Packs, which they use to propel themselves toward the
    foe amid resounding (and suspiciously well-synchronised) bellows of
    "WAAAGH!", striking the enemy line like ballistic missiles and hacking apart
    anything in arm's reach. Most Orks leave the Stormboyz for "proper" mobs as
    they age, but some &mdash; especially of the Blood Axes clan &mdash; gain a
    taste for it.</p>
