  notes: >-
    <p>Squighog Boyz are Beast Snaggas who ride four-legged Squighogs to battle.
    Tough, determined and heavily armed, they make up Beast Snagga fast cavalry,
    designed to engage at close range with an unrelenting fury of attacks and
    perfect for dealing with enemy light vehicles. They are armed with a variety
    of weapons including Stikkas, Bomb Squigs, their mounts themselves, and the
    weapons of their Grot saddle companions.</p><p><em>This profile bundles the
    Squighog mount, its Beast Snagga Boy rider, and a Gretchin "Saddlegit" as one
    Cavalry unit sharing a single turn (see the Cavalry rule).</em></p>
