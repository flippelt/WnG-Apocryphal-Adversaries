  notes: >-
    <p>The most important and skilled Mekboyz are known as Big Meks, who lead
    groups of lesser Mekboyz armed with kustom equipment and Kombi-weapons,
    sometimes commanding whole WAAAGHs!. A Big Mek's understanding of technology
    is unsurpassed amongst the Orkoid races, and one is often seen generating a
    Kustom Force Field around himself to protect his person and his creations. A
    Big Mek who leads a Greenskin WAAAGH! is called a "Mek-Boss".</p><p><em>Threat
    Options &mdash; Kontrapshunz: a Big Mek carries exactly ONE of a Kustom Force
    Field, a Shokk Attack Gun or a Tellyporta (all included unequipped). Kustom
    Gubbinz: he may swap his Spanner-Choppa for a Killsaw, and his Slugga for a
    Kustom Mega-Slugga or Kustom Mega-Blasta.</em></p>
