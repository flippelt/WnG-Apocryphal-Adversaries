  notes: >-
    <p>Killa Kans are smallish, bipedal walkers &mdash; a rickety, lightly
    armoured "kan" on piston-driven legs, armed with ranged and close-combat
    weapons. Primitive and weak by Ork standards but fast and incredibly dangerous
    for their size, one or two are more than a match for a Sentinel. A Killa Kan is
    not so much piloted as inhabited by an ill-tempered Gretchin hard-wired into
    the control systems &mdash; a process that increases the creature's aggression
    enormously, though the pilot retains a good degree of Gretchin
    cowardice.</p><p><em>Treated as a Vehicle (KAN). Threat Options &mdash; Killy
    Bitz: the Big Shoota may be swapped for a Rokkit Launcha, Skorcha or Grotzooka
    (all included unequipped).</em></p>
