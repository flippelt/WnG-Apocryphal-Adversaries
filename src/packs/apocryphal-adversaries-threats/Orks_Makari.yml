  notes: >-
    <p>Makari, also known as Makari the Grot, is an infamous Ork Gretchin &mdash;
    thought to be the luckiest Gretchin ever, having survived years at
    Ghazghkull's side (and several deaths) as the Warlord's official
    "banner-waver". He carries Ghazghkull's war banner, Da Lucky Stikk, on which
    he recorded the Warboss's prophecy in glyphs of Ghazghkull's own blood, and a
    treasured necklace made from fragments of the bullet that pierced
    Ghazghkull's brain. He enthusiastically capers at the front of Ghazghkull's
    mobs &mdash; usually just behind the Boss himself.</p>
