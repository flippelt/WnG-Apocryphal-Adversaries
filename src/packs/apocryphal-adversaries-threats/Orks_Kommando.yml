  notes: >-
    <p>A Kommando is an Ork Boy specialist who relies on "kunning trikz" instead
    of fighting head-on like most Greenskins. Kommandoz serve as the Orks'
    infiltrators and saboteurs &mdash; experts in stealth, ambush, unconventional
    tactics and striking from a totally unexpected quarter. Unlike most Boyz they
    use dirty tricks like camouflage and distraction, relying on a trait lacking
    amongst Orks: discipline. Though Kommandos exist in every clan, other Orks
    distrust them, finding the use of stealth distinctly un-Orky.</p><p><em>Threat
    Options &mdash; Speshul Gitz: in any group of Kommandos you may have one each
    of the following (all gear is included unequipped below). <strong>Slasha</strong>
    &mdash; replaces his Slugga with a second Sneaky Stabba and reduces the
    multi-Attack penalty by 2DN as if he had the Dual Wield talent.
    <strong>Breacha</strong> &mdash; replaces his Sneaky Stabba with a Breacha Ram
    and adds +2d to his attack when charging. <strong>Snipa</strong> &mdash;
    replaces all his weapons with a Scoped Big Shoota. <strong>Dakka Boy</strong>
    &mdash; replaces all his weapons with a Dakka Shoota. <strong>Comms Boy</strong>
    &mdash; replaces his weapons with a Vox Caster and a Shokka Pistol.
    <strong>Burna</strong> &mdash; replaces his weapons with a Burna (and its
    Cuttin' Flame melee profile). <strong>Rokkit Boy</strong> &mdash; replaces his
    weapons with a Rokkit Launcha.</em></p>
