  notes: >-
    <p>A Warboss is the biggest, greenest and meanest Ork in a tribe or clan, and
    so the supreme commander of every Greenskin under his jurisdiction. Relatively
    cunning strategists (by Ork standards) and exceedingly powerful warriors, they
    rise through the ranks by winning battles and killing every challenger. These
    monstrous killing machines can reach ten feet in height and are wider at the
    shoulder than an armoured Space Marine. A Warboss holds dominion over all he
    surveys, his decisions enforced by a ruling caste of Nobz.</p><p><em>Threat
    Options &mdash; Dakka: replace the Kustom Shoota with a Shoota plus a
    Kombi-Rokkit or Kombi-Skorcha. Choppin' an' Krumpin': replace the Big Choppa
    with a Power Klaw. (All options included unequipped.)</em></p>
