  notes: >-
    <p>Gretchin (or Grotz) are a smaller, more cowardly subspecies of Ork, low in
    the strict hierarchy of Greenskin society and used as living shields,
    minefield-clearers, footballs, scavengers and emergency rations. They enjoy
    fighting weaker opponents and are less likely to flee when they comfortably
    outnumber the foe, but otherwise have to be forced into battle by Runtherdz
    with grabba sticks and grot prods. Being a bit more organised than larger
    Orks, Gretchin maintain war machines and artillery, and serve as ammo runts
    to Warbosses, oilers to Mekboyz and orderlies to Mad Doks.</p>
