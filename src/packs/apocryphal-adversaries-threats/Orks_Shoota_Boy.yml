  mob: null
  notes: >-
    <p>Shoota Boyz are those Orks who prefer the "shooty" side of combat and
    serve solely as ranged infantry with no melee component like the standard
    Slugga Boyz. A Shoota Boy's prized possession is his ballistic, solid-shot
    automatic rifle or Shoota, from which he takes his name.</p><p>Despite their
    love of ranged combat and firearms, Shoota Boyz have no appreciation for
    marksmanship, and are more addicted to the violent noise and heavy recoil of
    automatic gunfire. This is psychologically due to the Ork belief that a
    firearm will not cause any real damage to the enemy unless it makes a loud,
    terrifying noise.</p><p><em>Threat Options &mdash; Special Weapons: one in
    ten Shoota Boyz may replace their shoota with a Big Shoota or a Rokkit
    Launcha (included unequipped).</em></p>
