  notes: >-
    <p>Runtherdz are Ork Oddboyz who exhibit a trait extremely uncommon among
    Orks: patience. Only they have the right mindset to "care" about their smaller
    Orkoid cousins, the Gretchins and Snotlings, and to train them with a
    carrot-and-stick approach &mdash; rewarding the efficient and beating only the
    poor performers. They make a good living selling well-trained Gretchin and
    Snotling servants, and on the battlefield either fight alongside the machines
    crewed by their Gretchin or lead a large mob forward, using the smaller
    Orkoids as diversions, living shields or living mine-detectors.</p><p><em>Threat
    Options &mdash; a Runtherd may replace their Grabba Stikk with a Grot Prod
    (included unequipped), may carry a Grot Lash (enables Master's Lash; included),
    and/or be accompanied by a Squig Hound (a separate creature; see the
    Attack Squigs / Squig entry).</em></p>
