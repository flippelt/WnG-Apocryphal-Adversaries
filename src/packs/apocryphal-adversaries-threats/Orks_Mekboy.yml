  notes: >-
    <p>A Mekboy (or Mek) is the Ork Oddboy who builds the weapons, vehicles and
    advanced technology used by Greenskins, and is especially vital to Speed
    Freeks for keeping their bikes and vehicles running. Meks go to war festooned
    in clanking, smoke-belching contraptions of their own design whose purpose
    stays a mystery until the big red button gets pushed &mdash; the latest wotsit
    might immolate swathes of the enemy, project gravitic force-bubbles to protect
    nearby Boyz, or simply engulf its operator in a ball of flame. Occasional
    malfunctions are forgiven, for even an exploding invention gives the Boyz a
    good laugh.</p><p><em>Threat Options &mdash; Kustom Gubbinz: a Mekboy may
    replace his Spanner-Choppa with a Killsaw, and/or his Kustom Mega-Slugga with
    a Kustom Mega-Blasta (both included unequipped below).</em></p>
