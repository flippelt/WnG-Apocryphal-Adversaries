  notes: >-
    <p>An Ork Painboy (also Mad Dok, or just Dok) is the Oddboy who fixes injuries
    even the regenerative Ork physiology cannot repair &mdash; severed limbs,
    brain damage &mdash; using crude "Stabby Bits" and bioniks built by the
    Mekboyz (sometimes attached to the wrong part of the patient). Orks only go to
    a Painboy when they have no other choice, as Doks are infamous for trying out
    experimental procedures (like the feared Squig brain transplant) on patients
    under "anaesthesia" &mdash; what other races would call a concussion. Yet Orks
    are resilient enough that most survive to tell the tale.</p>
