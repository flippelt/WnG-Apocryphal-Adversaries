  notes: >-
    <p>Grotsnik, also known as Mad Dok Grotsnik, was once a Painboy of some skill,
    now all but berserk with the desire to do harm to others &mdash; the most
    bloodthirsty and deranged of an unhinged breed. He rose to prominence as the
    personal Dok of Ghazghkull Thraka, credited with opening up the future
    Warlord's mind to the messages of Gork and Mork. Raving and screaming, he
    leads the charge at an all-out sprint, desperate to sink needles and blades
    into unwilling flesh; his chief value these days is as a frenzied
    whirlwind in the press of battle, though he can still rein himself in to save
    Ghazghkull's life.</p>
