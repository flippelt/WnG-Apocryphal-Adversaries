  notes: >-
    <p>Meganobz are the richest and most battle-hardened Ork Nobz in a warband,
    who pay a Mek to build them a suit of piston-driven Mega Armour covered in
    enough plating to turn its wearer into a walking tank &mdash; incredibly
    expensive, and the ultimate Greenskin status symbol. Even a direct tank-round
    hit is unlikely to do more than knock a Meganob over and worsen his foul
    temper; for many, the only chance of surviving an angry Meganob is to outrun
    him. To counteract that slowness, many roar into battle aboard armoured
    Battlewagons.</p><p><em>Threat Options &mdash; Da Best Gear: any Power Klaw
    may be exchanged for a Killsaw; any Kustom Shoota for a Killsaw, or a Shoota
    with a Kombi-Rokkit or Kombi-Skorcha (all included unequipped below).</em></p>
