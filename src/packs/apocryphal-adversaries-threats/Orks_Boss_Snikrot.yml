  notes: >-
    <p>Snikrot, also called Boss Snikrot and Snikrot the Stalker, is a vicious and
    skilled Ork Kommando who leads the Red Skull Kommandoz through the equatorial
    jungles of Armageddon. The Ork Hunters of the Armageddon Astra Militarum fear
    one Ork alone &mdash; a killer who slips through the jungle like a ghost,
    passing through throttlevine groves without disturbing a leaf, leaving his
    victims to bleed out with their eyes torn out and their scalps ripped free.
    Striking from the shadows where the defenders least expect them, Snikrot has
    vowed that even if Ghazghkull has given up on conquering Armageddon, he never
    will.</p>
