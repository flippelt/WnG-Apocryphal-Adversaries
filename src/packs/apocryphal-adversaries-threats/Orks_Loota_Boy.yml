  notes: >-
    <p>Lootas are the thieves and scavengers of Ork society &mdash; light-fingered
    villains who will pinch anything that isn't nailed down, and so efficient some
    can even loot enemy vehicles. They play an important role finding the bitz for
    Mekboyz' latest "projekt", and are often found in Big Mek warbands or among
    the Death Skulls clan. Their main weapon is the Deffgun, a heavy
    shoulder-mounted gun cobbled together by a Mek from stolen and scavenged
    weaponry.</p><p><em>Spannerz &mdash; Groups of Loota Boyz are often
    accompanied by one or more Spannerz, who use the same profile with the
    following changes: a Spanner gains the <strong>MEK</strong> keyword; its
    skills are Default 6, Awareness 5 (Passive 2), Intimidation 6, Tech 7,
    Ballistic Skill 5, Weapon Skill 7; and instead of the Deffgun it is armed with
    Stikkbombs and one of the Big Shoota, Rokkit Launcha or Kustom Mega-Blasta
    (all three are included unequipped below).</em></p>
