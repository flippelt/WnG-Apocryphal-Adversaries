  - name: Powers of the C’Tan
    type: ability
    _id: ZMzTDqj7WlYhQy05
    img: modules/wng-core/assets/icons/abilities/ability.webp
    system:
      dn: 0
      type: ""
      specification: ""
      effect: ""
      cost: 0
      requirements: ""
      description: "<p><p><strong>Cosmic Power.</strong> Each C’Tan Shard knows its own unique power (above) <em>and</em> one additional power, chosen or randomly selected from the six below. As an Action, spend 1 Ruin to use a power.</p><p><strong>1: Antimatter Meteor</strong> &mdash; affects the closest enemies within a Blast (20) within 24m. Each enemy in the blast suffers d3+Tier Mortal Wounds.</p><p><strong>2: Cosmic Fire</strong> &mdash; all enemies within 9m suffer 1d3+3 Mortal Wounds and are <em>burning</em>.</p><p><strong>3: Seismic Assault</strong> &mdash; Blast (10) within 18m. All within suffer 1d3+2 Mortal Wounds and are knocked prone and restrained until the end of their next turn.</p><p><strong>4: Sky of Falling Stars</strong> &mdash; place three Blast (6) within 18m. Each enemy within one of the blasts suffers 1d3+2 Mortal Wounds and is blinded until the end of their next turn.</p><p><strong>5: Time’s Arrow</strong> &mdash; select a single enemy within 18m and roll 1d6, adding twice the Tier. If the total exceeds the target’s maximum Wounds, the target ceases to exist (a PC may spend 1 Wrath to instead suffer 1d3+5 Mortal Wounds).</p><p><strong>6: Transdimensional Thunderbolt</strong> &mdash; a single enemy within 24m suffers 1d3+5 Mortal Wounds. Then roll 1d6 for every other target within 5m of it; on a 4+ they suffer 1 Mortal Wound.</p></p>"
      display: true
