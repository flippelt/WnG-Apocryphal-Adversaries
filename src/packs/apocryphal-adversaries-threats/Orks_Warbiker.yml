  notes: >-
    <p>A Warbiker (also called a Bikerboy) is an Ork addicted to high speed.
    Forming mobs, these addicts race into battle at suicidal speeds, exhausts
    belching greasy smoke, filling the air with a murderous storm of shots from
    their blazing Dakkaguns; the billowing clouds protect them from return fire
    until they thunder out on top of the foe. Cannier Warbosses send Warbikerz to
    trigger ambushes prematurely, run down supply convoys, or soften up defences
    before the rest of the tribe gives them a good stomping.</p><p><em>Warbikerz
    are normally encountered riding Ork Warbikes (Church of Steel, p. 104), or
    with their bikes nearby &mdash; W&amp;G models Ork vehicles as separate Actors,
    so add the Warbike from that supplement if you have it (Ork vehicles add the
    rider's Willpower to their Maximum Wounds). This profile can also be used for
    any Ork vehicle crews.</em></p>
