  notes: >-
    <p>A Snotling is the smallest Orkoid, a miniaturised Gretchin barely half a
    metre tall, occupying the very lowest rung of Ork society and bullied by all
    other Greenskins. They serve as cannon fodder, food, or even ammunition, but
    are mostly placed in agricultural and animal-husbandry roles thanks to their
    affinity with the fungus and Squigs that feed Ork settlements. Supervised by
    Runtherdz, they cultivate the fungus that gives Orks food, drink and medicine
    &mdash; when the Squigs don't eat them first.</p>
