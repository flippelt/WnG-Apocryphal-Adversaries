  notes: >-
    <p>Boss Zagstruk is the brutal commander of the Goff Stormboyz known as Da
    Vulcha's Boyz. He leads from the very tip of the assault, rokkit pack roaring,
    crashing into the enemy line with his rocket-driven Da Vulcha's Klaws. Where
    other Stormboyz drill and posture, Zagstruk simply hits harder and faster than
    anyone else, and his ladz follow him into the most suicidal of plunging
    charges.</p>
