  notes: >-
    <p>The strongest and meanest among his already brutal kin, this Warboss
    supplements his fearsome bulk with a piston-driven suit of incredibly durable
    Mega Armour, making a mockery of the tank-busting artillery hunters use to deal
    with rampaging bosses from afar. He strides into battle with a boss pole
    denoting his rank, an 'Uge Choppa that decimates his foes, and a Big Shoota
    operated by a grot perched precariously on his armour.</p><p><em>Note: the
    printed stat block lists Resilience 17 (a -1 vs the Mega Armour formula),
    reproduced here as written.</em></p>
