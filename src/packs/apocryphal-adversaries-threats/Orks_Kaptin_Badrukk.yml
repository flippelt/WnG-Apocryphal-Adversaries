  notes: >-
    <p>Kaptin Badrukk is the greatest Freebooter of his age, a monstrous, roaring
    privateer bedecked in barbarous finery whose Flash Gitz carry enough firepower
    to level a hab-block &mdash; and the Kaptin totes the most fearsome firearm of
    the lot, Da Rippa. Unusually cunning for an Ork, he serves as a tactical
    advisor to any Warlord wealthy enough to meet his outrageous fees, then
    "persuades" his employers to hand over the largest share of the loot before he
    and his crew thunder off aboard their oversized Kill Kroozer, Da Blacktoof, in
    search of more chaos and carnage.</p>
