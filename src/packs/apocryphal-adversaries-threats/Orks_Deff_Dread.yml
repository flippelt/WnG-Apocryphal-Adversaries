  notes: >-
    <p>The Ork Deff Dread is a combat walker comparable to a Space Marine
    Dreadnought, its Ork pilot cybernetically hardwired into the machine (its
    construction demands both a Mekboy and a Painboy). Many Orks volunteer for the
    process, since it makes them one of the biggest and most powerful Orks in the
    clan &mdash; though being permanently wired into a metal can drives them a bit
    mad, so new Deff Dreads often need "runnin' in" at the expense of nearby
    buildings.</p><p><em>Treated as a Vehicle (KAN). Threat Options &mdash; Killy
    Bitz: any Big Shoota or Dread Klaw may be swapped for a Rokkit Launcha, Kustom
    Mega-Blasta or Skorcha (all included unequipped).</em></p>
