  notes: >-
    <p>Slugga Boyz represent the standard heavy infantry of the Orks, and they
    are generally armed with ramshackle, semiautomatic, solid-shot ballistic
    pistols known as Sluggas and brutal, bladed melee weapons resembling
    cleavers or axes known as Choppas. A few scraps of Flak Armour or the Ork
    equivalent and a shoulder or back plate with the Ork's clan or personal
    insignia make up the poorly maintained armour of a Slugga Boy.</p><p>Slugga
    Boyz are the most common and typical Ork warriors, and they represent what
    the average Imperial human thinks of when they imagine an Ork. Slugga Boyz
    are anarchic brutes who love nothing more than a good fight, often leaving a
    horrific mess of whatever they attack on the battlefield.</p><p><em>Threat
    Options &mdash; Special Weapons: one in ten Slugga Boyz may also take a Big
    Shoota or a Rokkit Launcha (included unequipped).</em></p>
