  notes: >-
    <p>Beast Snagga Boys are a type of Ork Boy who seek out powerful beasts and
    deadly vehicles to hunt. While many Beast Snaggas go into battle aboard
    Squighogz, others prefer to fight on their own two feet. A lifetime of
    hunting dangerous beasts has made them larger and stronger than most Boyz,
    though they are still not as durable as a Nob. However, their strength makes
    them especially prone to lording it over the Boyz they fight
    alongside.</p><p><em>Threat Options &mdash; Special Weapons: one in ten Beast
    Snagga Boyz may also take a Thump Gun (included unequipped).</em></p>
