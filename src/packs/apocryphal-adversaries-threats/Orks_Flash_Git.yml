  notes: >-
    <p>Flash Gitz are an elite breed of Ork Nobz obsessed with their lovingly
    customised, ostentatiously polished and painted Snazzguns, which can wipe out
    entire squads of infantry in a hail of fire. Unlike other Nobz they prefer
    "more dakka" to being "stompier" &mdash; ranged fire over melee &mdash; making
    them powerful ranged heavy infantry for a WAAAGH!. Many are Bad Moons; they
    flaunt their wealth in Ork teef and garish, Gitfinda-studded armour, and are
    sometimes kicked out of tribes for their obnoxiousness, ending up as
    Freebooters.</p>
