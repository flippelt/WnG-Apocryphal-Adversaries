  notes: >-
    <p>A Nob is a larger Ork Boy &mdash; smaller than and subservient to a Warboss,
    but possessing real authority among other Greenskins thanks to his
    greater-than-average size and strength (the term is an Orkish bastardisation
    of the Low Gothic word for "noble"). To rise through the ranks takes cunning
    brutality and brutal cunning, and smashing the head of any challenger. Both
    feared and revered, Nobz serve as a crude ruling class, never above reminding
    the Boyz who's in charge by making a few bloody examples. Their armour is
    usually festooned with kill-trophies.</p><p><em>Threat Options &mdash; Da Best
    Gear: any Ork Nob may replace their Slugga and/or Chain Choppa with one of the
    options below (all included unequipped). The Shoota may also take a
    Kombi-Weapon (Kombi-Rokkit or Kombi-Skorcha).</em></p>
