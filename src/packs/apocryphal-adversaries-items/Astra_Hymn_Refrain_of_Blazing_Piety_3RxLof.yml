  description: "<p><strong>XP Cost: 20.</strong> If this Prayer is successful, a single enemy lacking the IMPERIUM keyword within 12m of you suffers 1d3 Mortal Wounds. If the enemy has the CHAOS keyword, they instead suffer 2d3 Mortal Wounds. Increase the number of Mortal Wounds by +1 per Exalted Icon shifted.</p><p><em>Invoking a Prayer is a Simple Action requiring a DN 3 Persuasion test, and inflicts 1d3 Shock (no Shock if the Wrath die is a 6). Each Prayer lasts one round; each Exalted Icon shifted extends the duration by one round, to a maximum of your Persuasion rank. Only PRIESTS with the IMPERIUM and ADEPTUS MINISTORUM keywords (and without CHAOS) may know these.</em></p>"
